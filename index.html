<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox | Viewer</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #060608;
            --card: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
        }

        body { 
            background-color: var(--bg); color: var(--text-main); 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center;
        }

        .main-wrapper {
            display: flex; width: 100%; max-width: 1100px; margin: 40px 20px; gap: 24px;
        }

        .content-area {
            flex: 3; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 40px; min-height: 600px;
        }

        .sidebar {
            flex: 1; position: sticky; top: 20px; height: fit-content;
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; border-radius: 8px;
        }

        .rich-text img { max-width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid var(--border); }
        
        .video-container {
            margin-top: 20px; position: relative; padding-bottom: 56.25%;
            height: 0; overflow: hidden; border-radius: 8px;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .resource-box {
            margin-top: 20px; padding: 15px; background: #000;
            border-radius: 8px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-action {
            width: 100%; padding: 12px; margin-top: 10px; background: transparent;
            border: 1px solid var(--border); color: white; border-radius: 6px;
            cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-action:hover { border-color: var(--accent); background: rgba(122, 108, 255, 0.1); }

        @media (max-width: 900px) { .main-wrapper { flex-direction: column; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="content-area">
        <h1 id="f-title" style="font-size: 32px; margin-bottom: 20px;">Loading...</h1>
        <div id="f-body" class="rich-text">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Fetching form data...
        </div>
    </div>

    <div class="sidebar">
        <div id="author-info" style="display:flex; align-items:center; gap:12px; margin-bottom:20px;"></div>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        <div style="font-size: 13px; color: var(--text-dim); line-height: 2;">
            <div><i class="fa-solid fa-calendar"></i> Posted: <span id="f-date">--</span></div>
            <div><i class="fa-solid fa-heart"></i> Appreciation: <span id="f-likes">0</span></div>
        </div>

        <button class="btn-action" onclick="interact('like')">
            <i class="fa-solid fa-thumbs-up"></i> Like Post
        </button>
        <button class="btn-action" style="color: #ff4d4d;" onclick="interact('report')">
            <i class="fa-solid fa-flag"></i> Report
        </button>
    </div>
</div>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";
    const urlParams = new URLSearchParams(window.location.search);
    const formID = urlParams.get('id');
    let currentForm = null;

    // --- 1. LOAD DATA ---
    async function loadPost() {
        if (!formID) {
            document.getElementById('f-body').innerHTML = "<h2>Error: No ID provided.</h2>";
            return;
        }

        try {
            const res = await fetch(API);
            const data = await res.json();

            // Find matching form using lowercase hyphen logic
            currentForm = data.find(f => {
                const emailUser = f.authorEmail ? f.authorEmail.split('@')[0].toLowerCase() : 'anonymous';
                const cleanTitle = f.title.toLowerCase().replace(/[^a-z0-9]/g, '');
                const targetID = formID.toLowerCase().replace(/\s+/g, '-');
                return `${emailUser}-${cleanTitle}` === targetID;
            });

            if (currentForm) {
                document.title = `${currentForm.title} | WolfVox`;
                document.getElementById('f-title').innerText = currentForm.title;
                document.getElementById('f-date').innerText = currentForm.date || "Today";
                document.getElementById('f-likes').innerText = currentForm.likes || 0;

                // Build HTML Content
                let finalHTML = `<div style="margin-bottom:20px;">${currentForm.content}</div>`;

                // Handle Images (Array or Single)
                const imgList = currentForm.images || (currentForm.image ? [currentForm.image] : []);
                imgList.forEach(src => {
                    if(src) finalHTML += `<img src="${src}" style="width:100%; margin-bottom:15px; border-radius:8px;">`;
                });

                // Handle Video
                const vidList = currentForm.videos || (currentForm.video ? [currentForm.video] : []);
                vidList.forEach(vidUrl => {
                    let vID = vidUrl.includes("v=") ? vidUrl.split("v=")[1].split("&")[0] : vidUrl.split("/").pop();
                    if(vID) finalHTML += `<div class="video-container"><iframe src="https://www.youtube.com/embed/${vID}" frameborder="0" allowfullscreen></iframe></div>`;
                });

                // Handle Downloads/Links
                if (currentForm.file) {
                    finalHTML += `<div class="resource-box"><span><i class="fa-solid fa-file"></i> Main File</span><a href="${currentForm.file}" target="_blank" style="color:var(--accent); text-decoration:none;">Download</a></div>`;
                }

                document.getElementById('f-body').innerHTML = finalHTML;

                // Sidebar Author
                document.getElementById('author-info').innerHTML = `
                    <img src="${currentForm.authorImg || 'https://ui-avatars.com/api/?name=?'}" width="45" height="45" style="border-radius:50%; border:1px solid var(--accent);">
                    <div>
                        <div style="font-weight: 700;">${currentForm.authorName}</div>
                        <div style="font-size: 11px; color: var(--accent);">@${currentForm.authorEmail.split('@')[0]}</div>
                    </div>`;
            } else {
                document.getElementById('f-body').innerHTML = "<h2>Form Not Found</h2><p>ID: " + formID + "</p>";
            }
        } catch (e) {
            document.getElementById('f-body').innerHTML = "<h2>Server Offline</h2>";
        }
    }

    // --- 2. INTERACTION ENGINE ---
    // (Defined in global scope so buttons can see it)
    async function interact(type) {
        const user = JSON.parse(localStorage.getItem('wv_user'));
        
        if (!user) {
            alert("Please sign in on the Hub first!");
            return;
        }

        if (!currentForm) {
            alert("Post data is still loading...");
            return;
        }

        try {
            const response = await fetch(`${API}/interact`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    title: currentForm.title,
                    authorEmail: currentForm.authorEmail,
                    voterEmail: user.email,
                    type: type
                })
            });

            const result = await response.json();
            if (result.success) {
                if(type === 'like') {
                    document.getElementById('f-likes').innerText = parseInt(document.getElementById('f-likes').innerText) + 1;
                    alert("Liked!");
                } else {
                    alert("Reported.");
                }
            } else {
                alert(result.message || "Already interacted.");
            }
        } catch (e) {
            alert("Could not connect to server.");
        }
    }

    loadPost();
</script>

</body>
</html>
