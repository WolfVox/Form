<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox | Forum</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #060608;
            --card: #161618;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
        }

        /* Roblox-style Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #393b3d; border-radius: 4px; }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            margin: 40px 20px;
            gap: 24px;
        }

        /* Content Column */
        .content-area {
            flex: 3;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            min-height: 600px;
        }

        /* Sidebar */
        .sidebar {
            flex: 1;
            position: sticky;
            top: 20px;
            height: fit-content;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 8px;
        }

        .breadcrumb {
            margin-bottom: 25px;
            font-size: 13px;
            color: var(--text-dim);
        }
        .breadcrumb a { color: var(--accent); text-decoration: none; }

        .post-body {
            line-height: 1.8;
            font-size: 16px;
            color: #d1d1d1;
        }
        
        .post-body img { 
            max-width: 100%; 
            border-radius: 8px; 
            margin: 20px 0; 
            border: 1px solid var(--border);
        }

        .author-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .author-box img {
            border-radius: 50%;
            border: 1px solid var(--border);
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-action:hover { background: #222; border-color: var(--accent); }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { position: relative; top: 0; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="content-area">
        <div class="breadcrumb">
            <a href="https://wolfvox.github.io/Forms/">WolfVox Hub</a> 
            <i class="fa-solid fa-chevron-right" style="font-size: 10px; margin: 0 8px;"></i> 
            <span id="b-title">Loading...</span>
        </div>

        <h1 id="f-title" style="font-size: 32px; margin-bottom: 20px; color: #fff;">---</h1>
        
        <div id="f-body" class="post-body">
            <div style="padding: 40px; text-align: center;">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 30px; color: var(--accent);"></i>
                <p>Retrieving database entries...</p>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div id="author-info" class="author-box">
            </div>
        
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        
        <div style="font-size: 13px; color: var(--text-dim); line-height: 2;">
            <div><i class="fa-solid fa-calendar-days"></i> Posted: <span id="f-date">--</span></div>
            <div><i class="fa-solid fa-heart"></i> Appreciation: <span id="f-likes">0</span></div>
            <div id="f-verify-status"></div>
        </div>

        <button class="btn-action" onclick="alert('Open the Search Hub to interact!')">
            <i class="fa-solid fa-thumbs-up"></i> Like Post
        </button>
        <button class="btn-action" style="color: #ff4d4d; border-color: rgba(255,77,77,0.2);" onclick="alert('Moderation report sent.')">
            <i class="fa-solid fa-flag"></i> Report
        </button>
    </div>
</div>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";
    const urlParams = new URLSearchParams(window.location.search);
    const formID = urlParams.get('id');

async function loadPost() {
    const urlParams = new URLSearchParams(window.location.search);
    const formID = urlParams.get('id'); // This gets "masvoxco-wooow12409q"

    if (!formID) {
        document.getElementById('f-body').innerHTML = "<h2>Error: No ID.</h2>";
        return;
    }

    try {
        const res = await fetch(API);
        const data = await res.json();

        // THE MATCHING ENGINE
        const form = data.find(f => {
            const emailUser = f.authorEmail ? f.authorEmail.split('@')[0].toLowerCase() : 'anonymous';
            const cleanTitle = f.title.toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, '-');
            
            const generatedID = `${emailUser}-${cleanTitle}`;
            
            // Compare the ID from the URL with the one we just built from the DB item
            return generatedID === formID.toLowerCase();
        });

        if (form) {
            // SUCCESS: Inject data
            document.getElementById('b-title').innerText = form.title;
            document.getElementById('f-title').innerText = form.title;
            document.getElementById('f-body').innerHTML = form.content;
            document.getElementById('f-date').innerText = form.date || "Recently";
            document.getElementById('f-likes').innerText = form.likes || 0;
            
            // Sidebar Update
            document.getElementById('author-info').innerHTML = `
                <img src="${form.authorImg}" width="45" height="45" style="border-radius:50%">
                <div>
                    <div style="font-weight:700;">${form.authorName}</div>
                    <div style="font-size:11px; color:var(--accent);">@${emailUser}</div>
                </div>`;
        } else {
            // FAILURE: Log the comparison to console to see why it failed
            console.log("URL ID:", formID);
            document.getElementById('f-body').innerHTML = `
                <div style="text-align:center; padding:50px;">
                    <h2>Form Not Found</h2>
                    <p>We checked ${data.length} posts but none matched your ID.</p>
                    <p>ID Attempted: <code style="background:#000; padding:5px; border-radius:4px;">${formID}</code></p>
                    <a href="https://wolfvox.github.io/Forms/" style="color:var(--accent);">Try searching again</a>
                </div>`;
        }
    } catch (e) {
        document.getElementById('f-body').innerHTML = "<h2>Server Connection Failed</h2>";
    }
}

    loadPost();
</script>

</body>
</html>
