<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Viewer</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg: #000000;
            --header: #000000;
            --card-bg: #0f0f10;
            --Notic-bg: rgb(0, 0, 0);
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
            --render-green: #00d1b2;
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: all 0.15s ease; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); margin: 0; 
        }

        /* NAVIGATION (Copied from Hub) */
        nav {
            display: flex; align-items: center; gap: 20px;
            padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .search-container { flex: 1; max-width: 400px; position: relative; }
        .search-container input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: white; padding: 6px 12px 6px 35px; border-radius: 6px; font-size: 13px;
        }
        .search-container i { position: absolute; left: 12px; top: 9px; color: var(--text-dim); font-size: 12px; }

        .sub-nav {
            display: flex; gap: 5px; padding: 10px 30px; 
            background: var(--header); border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .sub-btn {
            background: transparent; border: none; color: var(--text-main);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .sub-btn:hover { background: var(--border); }
        .sub-btn.active { border-bottom: 2px solid #f78166; border-radius: 0; font-weight: 600; }

        /* CONTENT LAYOUT */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; gap: 30px; min-height: 60vh; }
        .main-content { 
            flex: 3; background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 12px; padding: 40px; margin-bottom: 50px;
        }
        .sidebar { flex: 1; }
        .sidebar-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 12px; padding: 25px; position: sticky; top: 140px;
        }

        .post-body { line-height: 1.7; font-size: 16px; color: #d1d5db; }
        .post-body img { max-width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid var(--border); }
        .video-container { margin-top: 20px; position: relative; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .FeedBackBtn {
            position:relative; overflow:hidden; border-radius:0px; border:1px solid rgb(255, 255, 255);
            background:rgba(0, 0, 0, 0.02); color:white; font-weight:600; letter-spacing:0.4px;
            backdrop-filter:blur(6px); transition:all .25s cubic-bezier(.4,0,.2,1);
            box-shadow:0 4px 18px rgba(0,0,0,0.25); padding:10px; flex:1;
        }
        .FeedBackBtn:hover { color:#000; background:#fff; }

        /* SITEMAP (Copied from Hub) */
        .sitemap-container {
            max-width: 100%; margin-top: 50px;
            background: var(--Notic-bg); border-top: rgba(255, 255, 255, 0.235) solid 0.5px;
            padding: 40px; display: flex; justify-content: space-evenly; align-items: center;
        }
        .sitemap-col a { display: block; color: var(--accent); text-decoration: none; margin-bottom: 8px; font-size: 14px; }
        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; background-color: #000; border-top: 1px solid var(--border); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<nav>
    <img src="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true" height="30px" width="30px" onclick="location.href='index.html'" style="cursor:pointer">
    <h2 style="font-size: 18px; margin:0;">Wolf<span style="color:var(--accent)">Vox</span></h2>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search forms..." onkeyup="if(event.key==='Enter') window.location.href='index.html?q='+this.value">
    </div>
    <div style="flex-grow: 1;"></div>
    <div class="nav-links" id="navAuthArea" style="font-size: 14px; display: flex; gap: 15px; align-items: center;">
        <a href="javascript:void(0)" onclick="window.location.href='https://login.wolfvox.me'" style="color:white; text-decoration:none;">Sign In</a>
        <button onclick="window.location.href='https://login.wolfvox.me'" class="FeedBackBtn">Publish</button>
    </div>
</nav>

<div class="sub-nav">
    <button class="sub-btn active" onclick="location.href='/Forms'"><i class="fa-solid fa-code"></i> Forms</button>
    <button class="sub-btn" onclick="location.href='/Forms/Market'"><i class="fa-solid fa-shop"></i> Marketplace</button>
    <button class="sub-btn" onclick="location.href='/Forms/Docs'"><i class="fa-solid fa-book"></i> Docs</button>
    <button class="sub-btn" onclick="location.href='/Forms/Insights'"><i class="fa-solid fa-chart-line"></i> Insights</button>
</div>

<div class="container">
    <div class="main-content">
        <h1 id="f-title" style="margin-top:0; font-size: 32px; color:var(--accent);">Loading Form...</h1>
        <div id="f-body" class="post-body">
            <i class="fa-solid fa-spinner fa-spin"></i> Fetching from WolfVox Servers...
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-card">
            <div id="author-info" style="display:flex; align-items:center; gap:12px; margin-bottom:20px;"></div>
            <div style="font-size: 13px; color: var(--text-dim); line-height: 2; border-top: 1px solid var(--border); padding-top:15px;">
                <div><i class="fa-solid fa-calendar"></i> <span id="f-date">--</span></div>
                <div><i class="fa-solid fa-thumbs-up"></i> <span id="f-likes">0</span> Likes</div>
            </div>
            <button class="FeedBackBtn" onclick="interact('like')" style="width:100%; margin-top:20px; height:45px;">Like This Form</button>
            <button onclick="interact('report')" style="width:100%; background:none; border:none; color:var(--error); margin-top:15px; cursor:pointer; font-size:12px;">
                <i class="fa-solid fa-flag"></i> Report Content
            </button>
        </div>
    </div>
</div>

<div class="sitemap-container">
    <div><img src="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true" height="100px" width="100px"></div>
    <div class="sitemap-col"><h4>Product</h4><a href="index.html">Forms</a><a href="#">Market</a></div>
    <div class="sitemap-col"><h4>Resources</h4><a href="#">Docs</a><a href="#">Hub</a></div>
    <div class="sitemap-col"><h4>Community</h4><a href="#">Discord</a><a href="#">Twitter</a></div>
</div>

<footer>&copy; 2026 WolfVoxCo. | Community Forms.</footer>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h3>Sign In</h3>
        <div id="g_id_onload" data-client_id="116311894928-qararv9qqqhtjomb2nbljfbrgrho9uft.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black"></div>
        <button onclick="closeAuth()" style="margin-top:20px; background:none; border:none; color:var(--text-dim); cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";
    const urlParams = new URLSearchParams(window.location.search);
    const formID = urlParams.get('id');
    let currentForm = null;

    /* --- SHARED AUTH LOGIC (Cookies) --- */
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
        return null;
    }

    function setAuthCookie(data) {
        // Sets cookie for the entire wolfvox.me domain (if applicable) or current path
        const userData = JSON.stringify(data);
        document.cookie = `wv_user=${encodeURIComponent(userData)}; path=/; max-age=86400; SameSite=Lax`;
    }

    function logout() {
        document.cookie = "wv_user=; Max-Age=-99999999; path=/;";
        localStorage.removeItem('wv_user'); // Cleanup old method
        location.reload();
    }

    // Initialize user from Cookie or LocalStorage
    let user = null;
    const cookieData = getCookie('wv_user');
    if (cookieData) {
        user = JSON.parse(cookieData);
    } else {
        user = JSON.parse(localStorage.getItem('wv_user'));
    }

    /* --- OAUTH FIX --- */
    function handleGoogleLogin(response) {
        try {
            // Decode the JWT from Google
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            
            const newUser = {
                name: payload.name, 
                email: payload.email, 
                img: payload.picture
            };

            // Save to both for maximum compatibility across your pages
            setAuthCookie(newUser);
            localStorage.setItem('wv_user', JSON.stringify(newUser));

            user = newUser;
            closeAuth();
            updateNav();
            
            // Optional: Reload if you want to refresh the "Like" buttons state immediately
            alert(`Welcome back, ${user.name}!`);
            location.reload(); 
        } catch (e) {
            console.error("Login Error:", e);
            alert("Failed to sign in. Please try again.");
        }
    }

    /* --- UI LOGIC --- */
    function openAuth() { document.getElementById('authModal').style.display='flex'; }
    function closeAuth() { document.getElementById('authModal').style.display='none'; }
    function handlePublish() { if(!user) openAuth(); else window.location.href='Create.html'; }

    function updateNav() {
        const navAuth = document.getElementById('navAuthArea');
        if(user && navAuth) {
            navAuth.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; background:var(--card-bg); padding:5px 12px; border-radius:20px; border:1px solid var(--border);">
                    <span style="font-size:12px; font-weight:600;">${user.name}</span>
                    <img src="${user.img}" width="24" height="24" style="border-radius:50%; border:1px solid var(--accent);">
                </div>
                <a href="javascript:void(0)" onclick="logout()" style="color:var(--error); text-decoration:none; font-size:11px; font-weight:700; margin-left:10px;">LOGOUT</a>`;
        }
    }

    /* --- CONTENT LOADING --- */
    const getField = (obj, fieldName) => {
        if (!obj) return null;
        const keys = Object.keys(obj);
        const foundKey = keys.find(k => k.toLowerCase() === fieldName.toLowerCase());
        return foundKey ? obj[foundKey] : null;
    };

    function getYouTubeID(url) {
        if (!url || url === "null") return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function loadPost() {
        if (!formID) {
            document.getElementById('f-body').innerHTML = "<h2>No Form ID Provided</h2>";
            return;
        }

        try {
            const res = await fetch(API);
            const data = await res.json();

            currentForm = data.find(f => {
                const email = getField(f, 'authoremail') || "anonymous";
                const emailUser = email.split('@')[0].toLowerCase();
                const title = getField(f, 'title') || "untitled";
                const cleanTitle = title.toLowerCase().replace(/[^\w\s]|_/g, "").replace(/\s+/g, "");
                return `${emailUser}-${cleanTitle}` === formID.toLowerCase();
            });

            if (currentForm) {
                const fTitle = getField(currentForm, 'title') || "Untitled";
                const fContent = getField(currentForm, 'content') || "";
                const fImage = getField(currentForm, 'image');
                const fVideo = getField(currentForm, 'video');
                const fLink = getField(currentForm, 'link');
                const fDate = getField(currentForm, 'date') || "Recently";
                const fLikes = getField(currentForm, 'likes') || 0;

                document.title = `${fTitle} | WolfVox`;
                document.getElementById('f-title').innerText = fTitle;
                document.getElementById('f-date').innerText = fDate;
                document.getElementById('f-likes').innerText = fLikes;

                let contentHTML = `<div style="white-space: pre-wrap;">${fContent}</div>`;

                if (fImage && fImage !== "null" && fImage.length > 5) {
                    contentHTML += `
                        <div style="margin-top:25px; border:1px solid var(--border); border-radius:12px; padding:10px; background:rgba(255,255,255,0.02);">
                            <img src="${fImage}" style="width:100%; border-radius:8px; border:1px solid var(--border);" onerror="this.parentElement.style.display='none'">
                            <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:11px; color:var(--text-dim);">Attached Media</span>
                                <a href="${fImage}" target="_blank" class="FeedBackBtn" style="text-decoration:none; font-size:12px; padding:5px 15px;">
                                    <i class="fa-solid fa-expand"></i> View Original
                                </a>
                            </div>
                        </div>`;
                }

                const videoID = getYouTubeID(fVideo);
                if (videoID) {
                    contentHTML += `
                        <div class="video-container" style="margin-top:25px; border:1px solid var(--border);">
                            <iframe src="https://www.youtube.com/embed/${videoID}" frameborder="0" allowfullscreen></iframe>
                        </div>`;
                }

                if (fLink && fLink !== "null" && fLink.length > 5) {
                    contentHTML += `
                        <div style="margin-top:25px; padding:15px; background:rgba(122, 108, 255, 0.1); border-radius:8px; border:1px solid var(--accent); display:flex; align-items:center; gap:12px;">
                            <i class="fa-solid fa-link" style="color:var(--accent);"></i>
                            <a href="${fLink}" target="_blank" style="color:white; text-decoration:none; font-size:14px; word-break:break-all;">${fLink}</a>
                        </div>`;
                }

                document.getElementById('f-body').innerHTML = contentHTML;

                const aName = getField(currentForm, 'authorname') || "Anonymous Wolf";
                const aImg = getField(currentForm, 'authorimg') || 'https://ui-avatars.com/api/?name=?';
                const aEmail = getField(currentForm, 'authoremail') || 'anon@wolfvox.co';

                document.getElementById('author-info').innerHTML = `
                    <img src="${aImg}" width="42" height="42" style="border-radius:50%; border:2px solid var(--accent); object-fit:cover;">
                    <div>
                        <div style="font-weight:700;">${aName}</div>
                        <div style="font-size:11px; color:var(--text-dim);">@${aEmail.split('@')[0]}</div>
                    </div>`;
            } else {
                document.getElementById('f-body').innerHTML = "<h2>Form Not Found</h2>";
            }
        } catch (e) {
            console.error(e);
            document.getElementById('f-body').innerHTML = "<h2>Server Error</h2>";
        }
    }

    async function interact(type) {
        if (!user || !currentForm) return openAuth();
        try {
            await fetch(`${API}/interact`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id: currentForm.id,
                    title: getField(currentForm, 'title'),
                    authorEmail: getField(currentForm, 'authoremail'),
                    voterEmail: user.email,
                    type: type
                })
            });
            alert("Action Recorded!");
            if(type === 'like') location.reload();
        } catch (e) { alert("Error recording interaction."); }
    }

    // Run on startup
    window.onload = () => {
        updateNav();
        loadPost();
    };
</script>
</body>
</html>
