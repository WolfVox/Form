<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox | Forum</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #060608;
            --card: #161618;
            --border: #2d2d30;
            --accent: #00a2ff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
        }

        /* Roblox-style Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #393b3d; border-radius: 4px; }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* Layout Architecture */
        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: 40px 20px;
            gap: 24px;
        }

        /* Center Content Column */
        .content-area {
            flex: 3;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 45px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        /* Sticky Right Sidebar */
        .sidebar {
            flex: 1;
            position: sticky;
            top: 20px;
            height: fit-content;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 8px;
        }

        .breadcrumb {
            margin-bottom: 25px;
            font-size: 13px;
            color: var(--text-dim);
        }
        .breadcrumb a { color: var(--accent); text-decoration: none; }

        .post-body {
            line-height: 1.8;
            font-size: 16px;
            color: #d1d1d1;
        }
        .post-body img { 
            max-width: 100%; 
            border-radius: 8px; 
            margin: 25px 0; 
            border: 1px solid var(--border);
        }

        .author-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .author-box img {
            border-radius: 50%;
            border: 2px solid var(--accent);
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-action:hover { background: var(--border); border-color: var(--accent); }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { position: relative; top: 0; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="content-area">
        <div class="breadcrumb">
            <a href="https://wolfvox.github.io/Forms/">Home</a> 
            <i class="fa-solid fa-chevron-right" style="font-size: 10px; margin: 0 8px;"></i> 
            <span id="b-title">Loading...</span>
        </div>

        <h1 id="f-title" style="font-size: 34px; margin-bottom: 20px; color: #fff;">---</h1>
        
        <div id="f-body" class="post-body">
            <p>Fetching content from WolfVox API...</p>
        </div>
    </div>

    <div class="sidebar">
        <div id="author-info" class="author-box">
            </div>
        
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        
        <div style="font-size: 13px; color: var(--text-dim);">
            <p><i class="fa-solid fa-calendar-days"></i> Posted: <span id="f-date">--</span></p>
            <p><i class="fa-solid fa-heart"></i> Appreciation: <span id="f-likes">0</span></p>
        </div>

        <button class="btn-action" onclick="alert('Visit the main site to interact!')">
            <i class="fa-solid fa-thumbs-up"></i> Like Post
        </button>
        <button class="btn-action" style="color: #ff4d4d;" onclick="alert('Report submitted to WolfVox Moderation.')">
            <i class="fa-solid fa-flag"></i> Report
        </button>
    </div>
</div>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";
    const urlParams = new URLSearchParams(window.location.search);
    const formID = urlParams.get('id');
    
async function loadPost() {
    const urlParams = new URLSearchParams(window.location.search);
    const formID = urlParams.get('id');

    if (!formID) {
        document.getElementById('f-body').innerHTML = "<h2>Error: No ID found.</h2>";
        return;
    }

    try {
        const res = await fetch(API);
        const data = await res.json();

        // Match using the email-prefix + clean-title logic
        const form = data.find(f => {
            const emailUser = f.authorEmail ? f.authorEmail.split('@')[0] : 'anonymous';
            const cleanTitle = f.title.replace(/[^a-zA-Z0-9]/g, '');
            return `${emailUser}+${cleanTitle}` === formID;
        });

        if (form) {
            // ... (Your code to display the title, body, and author) ...
            document.getElementById('f-title').innerText = form.title;
            document.getElementById('f-body').innerHTML = form.content;
        } else {
            document.getElementById('f-body').innerHTML = "<h2>Form Not Found</h2><p>This post may have been deleted.</p>";
        }
    } catch (e) {
        document.getElementById('f-body').innerHTML = "<h2>Server Error</h2>";
    }
}

    loadPost();
</script>

</body>
</html>
